name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger check
        run: echo "Triggering deploy test run"

      - name: Decode SSH key
        run: |
          echo "${{ secrets.ORACLE_SSH_KEY_B64 }}" | base64 --decode > /tmp/oracle_deploy_key
          chmod 600 /tmp/oracle_deploy_key

      - name: Deploy via SSH
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/oracle_deploy_key ${ORACLE_USER}@${ORACLE_HOST} '
            set -e
            cd ~/app
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "Deployment completed successfully"
          '

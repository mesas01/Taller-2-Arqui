services:
  mongo:
    image: mongo:7
    container_name: taller2-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taller2-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taller2_arqui
      JWT_SECRET: change_this_secret
      JWT_EXPIRES_IN: 1d
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taller2-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo_data:
